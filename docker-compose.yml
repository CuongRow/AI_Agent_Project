services:
  mysql:
    image: mysql:8.0
    container_name: my_first_ai_project-db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: my_first_ai_project
      MYSQL_ROOT_PASSWORD: doyoucopy123
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h 127.0.0.1 -uroot -pdoyoucopy123 my_first_ai_project -e 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: my_first_ai_project-backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: my_first_ai_project
      DB_USER: root
      DB_PASS: doyoucopy123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my_first_ai_project-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
